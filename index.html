<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFL Playoff Timeline</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div id="app">
        <div id="app" style="overflow: visible"></div>
        <h1>NFL Playoff Timeline</h1>
        <div id="playoff-timeline"></div>
    </div>

    <div id="legend">
        <span class="legend-item"><span class="legend-symbol">🏆</span> Super Bowl Winner</span>
        <span class="legend-item"><span class="legend-symbol">✕</span> Super Bowl Loser</span>
        <span class="legend-item"><span class="legend-symbol">▼</span> AFC/NFC Runner-Up</span>
        <span class="legend-item"><span class="legend-symbol">●</span> Playoff Team</span>
        <span class="legend-item"><span class="legend-symbol">!</span> Negative Record Playoff Team</span>
    </div>

    <script src="index.js"></script>
</body>
</html>
